services:
  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  eurekaserver:
    build: ./eurekaserver
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  apigateway:
    build: ./apigateway
    ports:
      - "8080:8080"
    depends_on:
      - eurekaserver
    environment:
      SPRING_PROFILES_ACTIVE: docker

  deliveryservice:
    build: ./deliveryservice
    ports:
      - "8060:8060"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      MY_SECRET_KEY: ${MY_SECRET_KEY:-change-me}
      MY_EXPIRATION_TIME: ${MY_EXPIRATION_TIME:-3600000}

  orderservice:
    build: ./orderservice
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      MY_SECRET_KEY: ${MY_SECRET_KEY:-change-me}
      MY_EXPIRATION_TIME: ${MY_EXPIRATION_TIME:-3600000}

  paymentservice:
    build: ./paymentservice
    ports:
      - "8095:8095"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      MY_SECRET_KEY: ${MY_SECRET_KEY:-change-me}
      MY_EXPIRATION_TIME: ${MY_EXPIRATION_TIME:-3600000}

  productservice:
    build: ./productservice
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      MY_SECRET_KEY: ${MY_SECRET_KEY:-change-me}
      MY_EXPIRATION_TIME: ${MY_EXPIRATION_TIME:-3600000}

  sagaservice:
    build: ./sagaservice
    ports:
      - "8020:8020"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      MY_SECRET_KEY: ${MY_SECRET_KEY:-change-me}
      MY_EXPIRATION_TIME: ${MY_EXPIRATION_TIME:-3600000}

  userservice:
    build: ./userservice
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      MY_SECRET_KEY: ${MY_SECRET_KEY:-change-me}
      MY_EXPIRATION_TIME: ${MY_EXPIRATION_TIME:-3600000}

volumes:
  pgdata: